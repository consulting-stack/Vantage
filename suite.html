<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage — Business Management Suite</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C9A84C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vantage">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--surface:#111111;
  --gold:#C9A84C;--gold-hhc:#B8973F;
  --text:#F5F5F0;--dim:#cccccc;--muted:#888888;--r:6px;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;font-weight:300;
  display:flex;flex-direction:column;align-items:center;
  padding:48px 24px 32px;min-height:100vh;
}
.wordmark{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(40px,8vw,64px);letter-spacing:0.28em;
  color:var(--gold);text-indent:0.28em;text-align:center;
}
.tagline{
  margin-top:10px;font-size:13px;letter-spacing:0.32em;
  text-transform:uppercase;color:var(--muted);text-align:center;
}
.divider{
  width:64px;height:1px;background:var(--gold);opacity:0.5;margin:36px auto;
}
.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;width:100%;max-width:820px;margin:0 auto;flex:1;
  align-content:start;
}
.card{
  display:block;text-decoration:none;background:var(--surface);
  border:1px solid rgba(201,168,76,0.25);border-radius:var(--r);
  border-top:3px solid var(--accent);
  padding:36px 32px;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
}
.card:hover,.card:focus-visible{
  transform:translateY(-3px);border-color:var(--accent);
  box-shadow:0 12px 32px rgba(0,0,0,0.45);outline:none;
}
.card--hhc{--accent:var(--gold-hhc)}
.card--cis{--accent:var(--gold)}
.card h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:28px;color:var(--text);line-height:1.2;
}
.card .sub{
  margin-top:10px;font-size:12px;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--accent);
}
.card .open{
  margin-top:28px;font-size:13px;color:var(--dim);
  display:inline-flex;align-items:center;gap:8px;
}
.card .open::after{content:'\2192';color:var(--accent);transition:transform .2s ease}
.card:hover .open::after{transform:translateX(4px)}
footer{
  margin-top:48px;font-size:12px;letter-spacing:0.08em;color:var(--muted);
  text-align:center;
}
@media (max-width:640px){
  body{padding:36px 18px 24px}
  .card{padding:28px 24px}
}
</style>
</head>
<body>

<header>
  <h1 class="wordmark">VANTAGE</h1>
  <p class="tagline">Business Management Suite</p>
</header>

<div class="divider"></div>

<main class="cards">
  <a class="card card--hhc" href="invoice-hhc.html">
    <h2>Heavenly Hands Contracting</h2>
    <p class="sub">Invoice &amp; Estimate Creator</p>
    <span class="open">Open tool</span>
  </a>
  <a class="card card--cis" href="invoice.html">
    <h2>Celebrity Interior Solutions</h2>
    <p class="sub">Invoice &amp; Estimate Creator</p>
    <span class="open">Open tool</span>
  </a>
</main>

<footer>&copy; 2025 Vantage &middot; Powered by Marlowe Designs</footer>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}
</script>

</body>
</html>
